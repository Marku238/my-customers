<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Customers – Mark</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #F47920;
    --dark: #1a1a1a;
    --card: #242424;
    --surface: #2e2e2e;
    --border: #3a3a3a;
    --text: #f0f0f0;
    --muted: #888;
    --green: #4caf6e;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
  }

  header {
    background: var(--card);
    border-bottom: 2px solid var(--orange);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 0.3px;
  }

  header span {
    font-size: 12px;
    color: var(--muted);
  }

  .search-bar {
    padding: 12px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 9;
  }

  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }

  .search-bar input::placeholder { color: var(--muted); }
  .search-bar input:focus { border-color: var(--orange); }

  .list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    font-size: 15px;
    line-height: 1.6;
  }

  .empty strong { display: block; font-size: 32px; margin-bottom: 8px; }

  .card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .card.hot { border-left: 3px solid var(--orange); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    cursor: pointer;
    gap: 10px;
  }

  .card-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--orange);
    color: white;
    font-weight: 700;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .card-name { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-date { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .card-badges { display: flex; gap: 6px; flex-wrap: wrap; }

  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .badge.hot-badge { background: rgba(244,121,32,0.15); color: var(--orange); border-color: rgba(244,121,32,0.3); }

  .card-body {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    display: none;
  }

  .card-body.open { display: block; }

  .products-list { margin-bottom: 12px; }
  .products-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

  .product-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px;
    background: var(--surface);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .product-item .del-product {
    background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
  }

  .add-product-row {
    display: flex; gap: 8px; margin-bottom: 14px;
  }

  .add-product-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }

  .add-product-row input:focus { border-color: var(--orange); }
  .add-product-row input::placeholder { color: var(--muted); }

  .btn-add-product {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .notes-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    width: 100%;
    min-height: 64px;
    resize: none;
    outline: none;
    font-family: inherit;
    margin-bottom: 12px;
  }

  .notes-area:focus { border-color: var(--orange); }
  .notes-area::placeholder { color: var(--muted); }

  .card-actions { display: flex; gap: 8px; }

  .btn-hot {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(244,121,32,0.4);
    background: transparent;
    color: var(--orange);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-hot.active { background: rgba(244,121,32,0.15); }

  .btn-delete {
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px; right: 20px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--orange);
    color: white;
    font-size: 30px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(244,121,32,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
    transition: transform 0.1s;
  }

  .fab:active { transform: scale(0.93); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 30;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 500px;
    border-top: 2px solid var(--orange);
  }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 18px;
    color: var(--orange);
  }

  .modal label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 6px; }

  .modal input, .modal textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
  }

  .modal input:focus, .modal textarea:focus { border-color: var(--orange); }
  .modal input::placeholder, .modal textarea::placeholder { color: var(--muted); }

  .modal-actions { display: flex; gap: 10px; }

  .btn-save {
    flex: 1;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  .btn-cancel {
    padding: 14px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
  }

  .count-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>🛋️ My Customers</h1>
  <span id="countPill" class="count-pill">0</span>
</header>

<div class="search-bar">
  <input type="search" id="searchInput" placeholder="Search by name or product…" oninput="render()">
</div>

<div class="list" id="list">
  <div class="empty"><strong>👤</strong>Tap <b>+</b> to add your first customer.<br>Log what you showed them so you're ready when they return.</div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">+</button>

<!-- Add Customer Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>New Customer</h2>
    <label>Customer Name</label>
    <input type="text" id="newName" placeholder="e.g. Sarah Thompson" autocomplete="off">
    <label>First Product Shown</label>
    <input type="text" id="newProduct" placeholder="e.g. Archer 3-seater sofa, Stone" autocomplete="off">
    <label>Notes (optional)</label>
    <input type="text" id="newNotes" placeholder="e.g. Coming back Saturday, budget ~$3k" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNew()">Save</button>
    </div>
  </div>
</div>

<script>
  let customers = JSON.parse(localStorage.getItem('fof_customers') || '[]');

  function save() {
    localStorage.setItem('fof_customers', JSON.stringify(customers));
  }

  function initials(name) {
    return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const today = new Date();
    const diff = Math.floor((today - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7) return `${diff} days ago`;
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
  }

  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const list = document.getElementById('list');

    let filtered = customers.filter(c => {
      if (!q) return true;
      return c.name.toLowerCase().includes(q) || c.products.some(p => p.toLowerCase().includes(q));
    });

    // hot first, then newest
    filtered.sort((a,b) => (b.hot - a.hot) || (b.ts - a.ts));

    document.getElementById('countPill').textContent = customers.length;

    if (filtered.length === 0) {
      list.innerHTML = customers.length === 0
        ? `<div class="empty"><strong>👤</strong>Tap <b>+</b> to add your first customer.<br>Log what you showed them so you're ready when they return.</div>`
        : `<div class="empty"><strong>🔍</strong>No customers match "<b>${q}</b>"</div>`;
      return;
    }

    list.innerHTML = filtered.map(c => `
      <div class="card ${c.hot ? 'hot' : ''}" id="card-${c.id}">
        <div class="card-header" onclick="toggle('${c.id}')">
          <div class="card-left">
            <div class="avatar">${initials(c.name)}</div>
            <div>
              <div class="card-name">${c.name}</div>
              <div class="card-date">${formatDate(c.ts)} · ${c.products.length} product${c.products.length !== 1 ? 's' : ''}</div>
            </div>
          </div>
          <div class="card-badges">
            ${c.hot ? '<span class="badge hot-badge">🔥 Hot</span>' : ''}
          </div>
        </div>
        <div class="card-body ${c.open ? 'open' : ''}" id="body-${c.id}">
          <div class="products-list">
            <div class="products-label">Products Shown</div>
            ${c.products.map((p,i) => `
              <div class="product-item">
                <span>${p}</span>
                <button class="del-product" onclick="removeProduct('${c.id}',${i})">×</button>
              </div>`).join('')}
            <div class="add-product-row">
              <input type="text" id="np-${c.id}" placeholder="Add another product…" onkeydown="if(event.key==='Enter')addProduct('${c.id}')">
              <button class="btn-add-product" onclick="addProduct('${c.id}')">Add</button>
            </div>
          </div>
          <textarea class="notes-area" id="notes-${c.id}" placeholder="Notes — budget, timeline, callback…" onblur="saveNotes('${c.id}')">${c.notes || ''}</textarea>
          <div class="card-actions">
            <button class="btn-hot ${c.hot ? 'active' : ''}" onclick="toggleHot('${c.id}')">
              ${c.hot ? '🔥 Hot lead' : '🔥 Mark hot'}
            </button>
            <button class="btn-delete" onclick="deleteCustomer('${c.id}')">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggle(id) {
    const c = customers.find(x => x.id === id);
    c.open = !c.open;
    save();
    render();
  }

  function toggleHot(id) {
    const c = customers.find(x => x.id === id);
    c.hot = !c.hot;
    save(); render();
  }

  function addProduct(id) {
    const input = document.getElementById('np-' + id);
    const val = input.value.trim();
    if (!val) return;
    const c = customers.find(x => x.id === id);
    c.products.push(val);
    save(); render();
  }

  function removeProduct(id, idx) {
    const c = customers.find(x => x.id === id);
    c.products.splice(idx, 1);
    save(); render();
  }

  function saveNotes(id) {
    const c = customers.find(x => x.id === id);
    c.notes = document.getElementById('notes-' + id).value;
    save();
  }

  function deleteCustomer(id) {
    if (!confirm('Remove this customer?')) return;
    customers = customers.filter(x => x.id !== id);
    save(); render();
  }

  function openModal() {
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('newName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('newName').value = '';
    document.getElementById('newProduct').value = '';
    document.getElementById('newNotes').value = '';
  }

  function saveNew() {
    const name = document.getElementById('newName').value.trim();
    if (!name) { document.getElementById('newName').focus(); return; }
    const product = document.getElementById('newProduct').value.trim();
    const notes = document.getElementById('newNotes').value.trim();
    customers.unshift({
      id: Date.now().toString(),
      name,
      products: product ? [product] : [],
      notes,
      ts: Date.now(),
      hot: false,
      open: false
    });
    save(); closeModal(); render();
  }

  // Close modal on overlay tap
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  render();
</script>
</body>
</html>
